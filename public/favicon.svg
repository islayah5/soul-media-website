<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="favGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFEBEF" />
      <stop offset="50%" stop-color="#FFB6D9" />
      <stop offset="100%" stop-color="#E5D4FF" />
    </linearGradient>

    <radialGradient id="flashGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1" />
      <stop offset="40%" stop-color="#C2FFE5" stop-opacity="0.8" />
      <stop offset="80%" stop-color="#FFB6D9" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#0D0B14" stop-opacity="0" />
    </radialGradient>

    <filter id="softFavGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <style>
      @keyframes flashBurst {
        0%, 82%, 100% {
          opacity: 0;
          transform: scale(0.3);
        }
        85% {
          opacity: 1;
          transform: scale(1.6);
        }
        88% {
          opacity: 0.4;
          transform: scale(1.1);
        }
        92% {
          opacity: 0.9;
          transform: scale(1.4);
        }
        96% {
          opacity: 0;
          transform: scale(0.4);
        }
      }

      @keyframes lensPulse {
        0%, 100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
      }

      .camera-flash {
        animation: flashBurst 4s infinite ease-in-out;
        transform-origin: 43px 12px;
      }

      .camera-lens {
        animation: lensPulse 4s infinite ease-in-out;
        transform-origin: 32px 36px;
      }
    </style>
  </defs>

  <!-- Background Canvas Frame -->
  <rect width="64" height="64" rx="16" fill="#0D0B14" />
  
  <!-- Subtle Glowing Outer Ring -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="none" stroke="url(#favGradient)" stroke-width="1.5" stroke-opacity="0.3" />

  <!-- Camera Body Group -->
  <g filter="url(#softFavGlow)">
    <!-- Camera Flash Mount Bump -->
    <rect x="36" y="10" width="14" height="8" rx="3" fill="url(#favGradient)" />

    <!-- Main Camera Body -->
    <rect x="8" y="17" width="48" height="36" rx="10" fill="url(#favGradient)" />

    <!-- Outer Camera Lens Ring -->
    <circle class="camera-lens" cx="32" cy="35" r="12" fill="#0D0B14" />

    <!-- Inner Camera Lens Pupil -->
    <circle class="camera-lens" cx="32" cy="35" r="6" fill="url(#favGradient)" />

    <!-- Camera Viewfinder Indicator -->
    <circle cx="16" cy="24" r="2.5" fill="#0D0B14" opacity="0.6" />

    <!-- Pulsing Camera Flash Light Burst -->
    <circle class="camera-flash" cx="43" cy="12" r="10" fill="url(#flashGlow)" />
  </g>
</svg>
